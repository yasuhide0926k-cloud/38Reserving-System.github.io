<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文化祭 入場ゲート</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { padding: 20px; background: #e3f2fd; text-align: center; }
    /* スキャナーの枠 */
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 5px solid #2196f3; border-radius: 10px; background: #000; overflow: hidden; }
    .status-badge { font-size: 1.5rem; padding: 20px; border-radius: 10px; margin: 15px 0; font-weight: bold; }
  </style>
</head>
<body>
  <h3>🚪 入場ゲート</h3>
  
  <div id="scanner-section">
    <div id="reader"></div>
    <p class="mt-2 text-muted">入場QRをスキャンしてください</p>
  </div>

  <div id="result-area" style="display:none;" class="card shadow p-3">
    <h4 id="display-hrno"></h4>
    <p id="display-time" class="badge p-2 fs-6"></p>
    <div id="display-status" class="status-badge"></div>
    <div id="action-btn" style="display:none;">
      <button class="btn btn-primary btn-lg w-100 p-4" id="entry-btn" onclick="entry()">入場を記録する</button>
    </div>
    <button class="btn btn-secondary mt-3" onclick="reset()">次の人をスキャン</button>
  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyFnt0erEzKGuWCoZlI6KmmUGBTfjNK6tlAEiICNqGIuCZB0P1BkuhGCLJWM0DN6OQ/exec";

    let html5QrCode;
    let isProcessing = false;
    let currentId = "";

    // 1. スキャナーの起動設定
    async function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      try {
        await html5QrCode.start(
          { facingMode: "environment" }, // 外側のカメラを使用
          { fps: 10, qrbox: { width: 250, height: 250 } }, // 読み取り速度と枠のサイズ
          onScanSuccess // 読み取り成功時の処理
        );
      } catch (err) {
        alert("カメラ起動エラー: " + err);
      }
    }

    // 2. 読み取った瞬間の処理
    async function onScanSuccess(decodedText) {
      if (isProcessing) return; // 通信中なら2回目を無視
      
      const id = decodedText.trim();
      if (id.length > 5) {
        isProcessing = true; // ロックをかける
        currentId = id;
        
        if (navigator.vibrate) navigator.vibrate(200); // 振動でお知らせ
        
        // メモリ節約のため、一度カメラを止める
        try {
          await html5QrCode.stop();
        } catch(e) { console.log(e); }

        fetchTicketInfo(id);
      }
    }

    // 画面ロード時にカメラ起動
    window.onload = startScanner;

    // --- 以下、通信と画面表示の処理（変更なし） ---
    async function fetchTicketInfo(id) {
      try {
        const url = `${GAS_API_URL}?action=check&id=${id}&t=${new Date().getTime()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("サーバー応答エラー");
        
        const result = await fetch(url, {
      method: 'GET',
      mode: 'cors',
      cache: 'no-cache'
    });

    if (!res.ok) throw new Error("ネットワーク応答が異常です");

    // 一旦テキストとして受け取る
    const text = await res.text();
    // テキストを無理やりJSONデータとして解釈する
    const result = JSON.parse(text);
    
    if(result.success) show(result.data);
    else { alert(result.message); reset(); }
  } catch(e) { 
    // ここで具体的なエラー内容を表示させる
    console.error(e);
    alert("通信失敗: " + e.message + "\n※iPhoneの場合はSafari設定の「サイト越えトラッキングを防ぐ」をOFFにしてみてください。"); 
    reset(); 
  }
}
        
        if(result.success) show(result.data);
        else { alert(result.message); reset(); }
      } catch(e) { 
        alert("通信エラーが発生しました: " + e.message); 
        reset(); 
      }
    }

    async function entry() {
      const btn = document.getElementById('entry-btn');
      btn.disabled = true;
      btn.innerText = "処理中...";

      try {
        const url = `${GAS_API_URL}?action=entry&id=${currentId}&t=${new Date().getTime()}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("サーバーエラー");
        
        const result = await res.json();
        alert(result.message);
        reset();
      } catch(e) { 
        alert("通信エラー: " + e.message); 
        reset(); 
      } finally {
        btn.disabled = false;
        btn.innerText = "入場を記録する";
      }
    }

    function show(res) {
      document.getElementById('display-hrno').innerText = "HRNO: " + res.hrno;
      const tBox = document.getElementById('display-time');
      tBox.innerText = res.time + " (" + res.message + ")";
      tBox.className = "badge p-2 fs-6 " + (res.timeStatus === "OK" ? "bg-success" : "bg-danger");
      
      const b = document.getElementById('display-status');
      const actionBtn = document.getElementById('action-btn');
      const isTimeOk = (res.timeStatus === "OK");

      if (res.status === "支払い済み" && isTimeOk) {
        b.innerText = "⭕ 入場OK"; b.className = "status-badge bg-success text-white";
        actionBtn.style.display = "block";
      } else if (res.status === "未払い") {
        b.innerText = "🛑 未決済"; b.className = "status-badge bg-warning text-dark";
        actionBtn.style.display = "none";
      } else if (!isTimeOk) {
        b.innerText = "❌ 時間外"; b.className = "status-badge bg-danger text-white";
        actionBtn.style.display = "none";
      } else {
        b.innerText = "⚠️ 入場済み"; b.className = "status-badge bg-secondary text-white";
        actionBtn.style.display = "none";
      }
      document.getElementById('scanner-section').style.display="none"; 
      document.getElementById('result-area').style.display="block";
    }

    function reset() { 
      isProcessing = false; 
      document.getElementById('scanner-section').style.display="block"; 
      document.getElementById('result-area').style.display="none"; 
      startScanner(); // カメラ再起動
    }
  </script>
</body>
</html>
