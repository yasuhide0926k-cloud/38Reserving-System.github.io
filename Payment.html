<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>レジ画面 | 模擬店システム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { padding: 20px; background: #fff3e0; text-align: center; font-family: sans-serif; }
    /* スキャナー枠 */
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 5px solid #ff9800; border-radius: 10px; background: #000; overflow: hidden; }
    .status-badge { font-size: 1.5rem; padding: 20px; border-radius: 10px; margin: 15px 0; font-weight: bold; }
    .card { border: none; border-radius: 15px; }
  </style>
</head>
<body>
  <h3 class="mb-3">💰 レジ画面 (現金領収)</h3>
  
  <div id="scanner-section">
    <div id="reader"></div>
    <p class="mt-3 text-muted">予約メールのQRをスキャンしてください</p>
  </div>

  <div id="result-area" style="display:none;" class="card shadow p-4">
    <h2 id="display-hrno" class="fw-bold text-primary"></h2>
    <div id="display-status" class="status-badge"></div>
    
    <div id="action-btn-area" style="display:none;">
      <p class="text-danger fw-bold">現金を領収しましたか？</p>
      <button class="btn btn-success btn-lg w-100 p-4 mb-3 fw-bold shadow" id="pay-btn" onclick="executePay()">現金を領収して有効化</button>
    </div>
    
    <button class="btn btn-outline-secondary w-100" onclick="resetScanner()">次の人をスキャン</button>
  </div>

  <script>
    // ★重要：ご自身のGASウェブアプリURLに書き換えてください★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyFnt0erEzKGuWCoZlI6KmmUGBTfjNK6tlAEiICNqGIuCZB0P1BkuhGCLJWM0DN6OQ/exec";
    
    let html5QrCode;
    let currentId = "";
    let isProcessing = false;

    // スキャナー起動
    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 }, 
        (id) => {
          if (isProcessing) return;
          isProcessing = true;
          currentId = id.trim();
          
          if (navigator.vibrate) navigator.vibrate(200); // 読み取り時に振動
          
          // カメラを止めて解析へ
          html5QrCode.stop().then(() => fetchInfo(currentId));
        }
      ).catch(err => alert("カメラエラー: " + err));
    }

    // チケット情報を確認
    async function fetchInfo(id) {
      try {
        // Androidエラー回避のためシンプルなFetch
        const res = await fetch(`${GAS_URL}?action=check&id=${id}&t=${new Date().getTime()}`);
        const text = await res.text(); // 一旦テキストで受ける
        const result = JSON.parse(text); // JSONに変換

        if (!result.success) {
          alert("エラー: " + result.message);
          return resetScanner();
        }

        const data = result.data;
        document.getElementById('display-hrno').innerText = "HR: " + data.hrno;
        
        const s = document.getElementById('display-status');
        const btnArea = document.getElementById('action-btn-area');

        if (data.status === "未払い") {
          s.innerText = "💸 未決済";
          s.className = "status-badge bg-warning text-dark";
          btnArea.style.display = "block";
        } else {
          s.innerText = "✅ " + data.status;
          s.className = "status-badge bg-success text-white";
          btnArea.style.display = "none";
        }

        document.getElementById('scanner-section').style.display = "none";
        document.getElementById('result-area').style.display = "block";

      } catch (e) {
        alert("通信エラーが発生しました。Wi-Fiを切って試してみてください。");
        resetScanner();
      }
    }

    // 支払い実行
    async function executePay() {
      const btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.innerText = "処理中...";

      try {
        const res = await fetch(`${GAS_URL}?action=pay&id=${currentId}`);
        const text = await res.text();
        const result = JSON.parse(text);
        
        alert(result.message);
        resetScanner();
      } catch (e) {
        alert("支払い処理に失敗しました。");
        resetScanner();
      }
    }

    // スキャナーをリセットして再開
    function resetScanner() {
      isProcessing = false;
      document.getElementById('scanner-section').style.display = "block";
      document.getElementById('result-area').style.display = "none";
      document.getElementById('pay-btn').disabled = false;
      document.getElementById('pay-btn').innerText = "現金を領収して有効化";
      startScanner();
    }

    // ページ読み込み時にスキャナー開始
    window.onload = startScanner;
  </script>
</body>
</html>
